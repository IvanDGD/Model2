{% extends 'layout.html' %}

{% block content %}
<div class="user-profile-card" style="max-width: 400px;">
    <div class="user-profile-header">
        <h2>Регистрация читателя</h2>
    </div>
    <div class="user-profile-body">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div style="margin-bottom: 15px;">
                    <label style="display:block; font-size: 12px; font-weight: bold; margin-bottom: 5px;">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div style="color: red; font-size: 12px;">{{ field.errors }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" style="width: 100%; padding: 10px; margin-top: 10px;">Зарегистрироваться</button>
        </form>
        <p style="text-align: center; margin-top: 15px; font-size: 14px;">
            Уже есть аккаунт? <a href="{% url 'login' %}" style="color: #4f46e5;">Войти</a>
        </p>
    </div>
</div>
{% endblock %}
