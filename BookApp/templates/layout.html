<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Управління товарами</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f5f7fb; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }

        /* Стили карточки профиля */
        .user-profile-card { max-width: 450px; margin: 20px auto; background: #ffffff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); overflow: hidden; border: 1px solid #eef2f5; }
        .user-profile-body { padding: 24px; }
        .profile-field { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f3f4f6; }
        .profile-field:last-child { border-bottom: none; }
        .field-icon { font-size: 18px; margin-right: 15px; width: 24px; text-align: center; }
        .field-content { flex-grow: 1; }
        .field-label { font-size: 11px; text-transform: uppercase; color: #9ca3af; font-weight: 700; margin-bottom: 2px; }
        .field-value { font-size: 15px; color: #1f2937; font-weight: 500; word-break: break-all; }
        .field-value.id-badge { font-family: monospace; font-size: 13px; color: #6b7280; background: #f3f4f6; padding: 2px 6px; border-radius: 4px; display: inline-block; }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
    </style>
</head>
<body>
    {% block content %}
    {% endblock %}
</body>
</html>
