{% extends 'layout.html' %}

{% block content %}
<h2>Список читачів</h2>
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Ім'я</th>
            <th>Прізвище</th>
            <th>Пошта</th>
            <th>Телефон</th>
            <th>Дії</th>
        </tr>
    </thead>
    <tbody>
        {% for r in readers %}
        <tr>
            <td>{{ r.id }}</td>
            <td>{{ r.name }}</td>
            <td>{{ r.surname }}</td>
            <td>{{ r.email }}</td>
            <td>{{ r.phone }}</td>
            <td><a href="{% url 'details' r.id %}">Деталі користувача</a></td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="6">Читачів не знайдено</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
